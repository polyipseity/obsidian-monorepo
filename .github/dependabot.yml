# Dependabot configuration
# <https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates>

version: 2
updates:
  # Bun (bun.lock)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      bun:
        patterns:
          - "*"
      bun-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  # GitHub Actions (workflow dependencies)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  # Git submodules (gitmodules)
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      gitsubmodule:
        patterns:
          - "*"
      gitsubmodule-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  # Python (pyproject.toml)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      uv:
        patterns:
          - "*"
      uv-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    exclude-paths:
      # wtf: <https://github.com/dependabot/dependabot-core/issues/13960>
      - "LICENSE.txt"
